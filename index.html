<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduSmart</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>EduSmart</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="home">
    <h2>Welcome to EduSmart</h2>
    <p>Learn smarter with free courses, quizzes and study materials.</p>
    <button onclick="showMessage()">Start Learning</button>
</section>

<section id="about">
    <h2>About Us</h2>
    <p>EduSmart is an education website created to help students learn programming and improve their skills.</p>
</section>

<section id="contact">
    <h2>Contact Us</h2>
    <form>
        <input type="text" placeholder="Your Name" required><br><br>
        <input type="email" placeholder="Your Email" required><br><br>
        <textarea placeholder="Your Message"></textarea><br><br>
        <button type="submit">Send</button>
    </form>
</section>

<script src="script.js"></script>

</body>
</html>
